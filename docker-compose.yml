docker-compose.yml


version: "3.8"

services:
  handshakeos-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python main.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/a2a/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin-console:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - handshakeos-api
    environment:
      - API_BASE=http://handshakeos-api:8000
    command: streamlit run ui/admin_console.py --server.port 8501 --server.address 0.0.0.0

